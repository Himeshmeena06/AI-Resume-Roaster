<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Resume Builder - RoastMyResume AI</title>
  <link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/builder.css">
</head>
<body>
  <nav class="nav"><div class="container nav-inner"><a class="brand" href="index.html"><span class="logo">R</span><span>RoastMyResume AI</span></a><div class="nav-links"><a href="builder.html">Builder</a><a href="analyzer.html">Analyzer</a><a href="roast.html">Roast</a><a href="dashboard.html">Dashboard</a><a href="settings.html">Settings</a></div></div></nav>
  <main class="app-shell">
    <div class="container">
      <div class="page-title"><div><h1 style="font-size:44px">Resume Builder</h1><p class="muted">Create a polished ATS resume with real-time preview and auto-save.</p></div><div class="preview-tools"><button class="btn" id="downloadTxt">TXT</button><button class="btn primary" id="downloadPdf">PDF</button></div></div>
      <div class="workspace">
        <aside class="panel glass-pad stack">
          <div class="field"><label>Template</label><select id="template" class="select"><option value="modern">Modern</option><option value="professional">Professional</option><option value="minimal">Minimal</option><option value="internship">Internship Ready</option><option value="faang">FAANG Style</option></select></div>
          <div class="tabs" id="sectionTabs"></div>
          <div id="editors"></div>
        </aside>
        <section><div id="resumePreview"></div></section>
      </div>
    </div>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="js/storage.js"></script><script src="js/app.js"></script><script src="js/builder.js"></script>
</body>
</html>
